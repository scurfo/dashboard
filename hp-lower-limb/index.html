<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HP Lower Limb Dashboard</title><style>:root{--navy:#061b2d;--blue:#00a7c8;--aqua:#73d3e5;--green:#16c784;--amber:#f3b33d;--red:#ef476f;--bg:#f5f8fb;--card:#fff;--muted:#6a7b8f;--line:#dce7ef}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif;color:#102033}.wrap{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,var(--navy),#08283f);color:#fff;padding:24px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.mark{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--aqua));display:grid;place-items:center;font-weight:900;color:var(--navy)}h1{font-size:18px;margin:0}.brand p{margin:4px 0 0;color:#b8dce6;font-size:13px}.athlete{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:14px;margin-bottom:18px}select{width:100%;padding:11px;border-radius:12px;border:0;font-weight:800}.meta{font-size:13px;color:#cce8ef;margin-top:10px;line-height:1.45}.nav{display:grid;gap:8px}.nav button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;text-align:left;border-radius:14px;padding:12px;display:flex;justify-content:space-between;gap:10px;cursor:pointer}.nav button.active,.nav button:hover{border-color:var(--blue);background:rgba(0,167,200,.25)}.main{padding:28px}.hero{display:flex;justify-content:space-between;gap:20px;align-items:center;background:radial-gradient(circle at 90% 0,rgba(0,167,200,.18),transparent 35%),var(--card);border-radius:28px;padding:28px;box-shadow:0 18px 45px rgba(6,27,45,.12);margin-bottom:22px}.eyebrow{text-transform:uppercase;letter-spacing:.12em;color:var(--blue);font-size:12px;font-weight:900;margin:0 0 8px}.hero h2{font-size:clamp(30px,4vw,52px);letter-spacing:-.04em;margin:0}.hero p{color:var(--muted);line-height:1.5;max-width:780px}.scorebox{background:var(--navy);color:#fff;border-radius:22px;padding:20px;min-width:190px;text-align:center}.scorebox span{color:#b8dce6;font-size:13px}.scorebox b{display:block;font-size:46px;margin:4px 0}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-bottom:20px}.panel{background:var(--card);border-radius:24px;padding:20px;box-shadow:0 18px 45px rgba(6,27,45,.1)}.map{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.q{border:1px solid var(--line);border-radius:20px;padding:16px;min-height:125px;cursor:pointer;position:relative;background:linear-gradient(180deg,#fff,#f9fcfd)}.q.active,.q:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,167,200,.14)}.q h3{margin:0 0 8px;font-size:15px}.q p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}.q b{position:absolute;right:14px;bottom:12px;font-size:22px}.bar{margin-bottom:12px}.barlabel{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:6px}.track{height:10px;border-radius:999px;background:#e8f0f6;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}.content{display:grid;grid-template-columns:1.4fr .7fr .7fr;gap:20px}.head{display:flex;justify-content:space-between;align-items:center}.btn,button.action{background:var(--navy);color:#fff;border:0;border-radius:12px;padding:10px 13px;font-weight:900;cursor:pointer}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.metric{border:1px solid var(--line);border-radius:18px;padding:13px}.mtop{display:flex;justify-content:space-between;gap:10px}.metric h4{margin:0;font-size:14px}.pill{border-radius:999px;font-size:11px;padding:4px 8px;font-weight:900;color:#fff;white-space:nowrap}.pass{background:var(--green)}.watch{background:var(--amber);color:#332200}.fail{background:var(--red)}.target{font-size:13px;color:var(--muted);margin:8px 0}.metric input{width:100%;padding:9px;border:1px solid var(--line);border-radius:10px;font-weight:900}.stream{border-left:4px solid var(--blue);background:#f1f9fb;border-radius:12px;padding:10px;margin-bottom:9px;font-weight:800}.priorities{padding-left:22px;color:var(--muted);line-height:1.5}textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px;font:inherit;min-height:120px}.actions{display:flex;gap:10px;margin-top:12px}@media(max-width:1000px){.wrap{grid-template-columns:1fr}.side{height:auto;position:relative}.grid,.content{grid-template-columns:1fr}.map{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.main{padding:14px}.hero{flex-direction:column;align-items:stretch}.map{grid-template-columns:1fr}}</style></head><body><div class="wrap"><aside class="side"><div class="brand"><div class="mark">HP</div><div><h1>Healthia Performance</h1><p>Lower Limb Clinical Dashboard</p></div></div><div class="athlete"><select id="ath"></select><div id="meta" class="meta"></div></div><nav id="nav" class="nav"></nav></aside><main class="main"><section class="hero"><div><p class="eyebrow">Concurrent qualities. Shifting emphasis.</p><h2 id="title"></h2><p id="desc"></p></div><div class="scorebox"><span>Overall Readiness</span><b id="overall">--%</b><p id="overalltxt"></p></div></section><section class="grid"><div class="panel"><div id="map" class="map"></div></div><div class="panel"><h3>Current Clinical Emphasis</h3><div id="bars"></div></div></section><section class="content"><div class="panel"><div class="head"><h3>Metric Targets</h3><button class="btn" id="reset">Reset</button></div><div id="metrics" class="metrics"></div></div><div class="panel"><h3>Programming Links</h3><div id="streams"></div></div><div class="panel"><h3>Clinical Priorities</h3><ol id="priorities" class="priorities"></ol></div></section><section class="panel" style="margin-top:20px"><h3>Clinician Summary</h3><textarea id="summary"></textarea><div class="actions"><button class="action" id="copy">Copy Summary</button><button class="action" id="export">Export JSON</button></div></section></main></div><script>const STAGES=[{id:'motor',name:'Motor Control & Capacity',desc:'Movement ownership, repeated capacity, early landing tolerance and bulletproofing flags.',streams:['Single-Leg Control','Capacity','Landing Prep','Bulletproofing Overlay'],em:{'Knee State':70,'Motor Control':95,Capacity:85,Strength:35,Power:10,Reactive:10,Running:5,COD:0,Bulletproofing:80},m:[['sl_squat','Single-Leg Squat to 90°',20,'reps @ 40 bpm','gte'],['split_squat','Split Squat',20,'reps @ 40 bpm','gte'],['sl_bridge','Single-Leg Hamstring Bridge',20,'reps @ 40 bpm','gte'],['sl_calf','Single-Leg Calf Raise',25,'reps @ 60 bpm','gte'],['box_landing_lsi','Box Landing Peak Force LSI',80,'%','gte']]},{id:'strength',name:'Strength & Hypertrophy',desc:'Local torque, hypertrophy and global force capacity.',streams:['Quad','Hamstring','Calf / Soleus','Hip Strength','Bilateral Lift','Single-Leg Strength'],em:{'Knee State':30,'Motor Control':55,Capacity:65,Strength:100,Power:25,Reactive:10,Running:10,COD:5,Bulletproofing:65},m:[['knee_ext','Knee Extension Strength',3.3,'Nm/kg','gte'],['knee_flex','Knee Flexion Strength',2.0,'Nm/kg','gte'],['seated_pf','Seated Plantarflexion Strength',200,'% BW','gte'],['hip_abd','Hip Abduction Strength',2.0,'Nm/kg','gte'],['sl_depth','5RM SL Squat Depth Average',105,'° knee flexion','gte'],['front_squat','Front Squat 1RM',1.5,'× BW','gte'],['deadlift','Deadlift 1RM',2.25,'× BW','gte'],['split_load','Split Squat 5RM',0.5,'× BW','gte']]},{id:'power',name:'Power & RFD',desc:'Force expressed quickly through double-leg and single-leg countermovement jumping.',streams:['Jump Power','Quad Speed','Hip Extension Power','Landing Kinematics'],em:{'Knee State':15,'Motor Control':45,Capacity:50,Strength:75,Power:100,Reactive:45,Running:30,COD:20,Bulletproofing:35},m:[['dl_cmj','DL CMJ Height',38,'cm','gte'],['dl_impulse','DL CMJ Concentric Impulse',2.6,'N·s/kg','gte'],['dl_p2','DL CMJ P2 Impulse',45,'% total','gte'],['dl_ecc','DL CMJ Eccentric Impulse',0.5,'N·s/kg','gte'],['dl_power','DL CMJ Peak Power',52,'W/kg','gte'],['dl_land','DL CMJ Peak Landing Force',[35,55],'N/kg','range'],['sl_cmj','SL CMJ Height',17.1,'cm','gte'],['sl_impulse','SL CMJ Concentric Impulse',1.35,'N·s/kg','gte'],['sl_p2','SL CMJ P2 Contribution',45,'%','gte'],['sl_ecc','SL CMJ Eccentric Impulse',0.35,'N·s/kg','gte'],['sl_land','SL CMJ Peak Landing Force',[22,28],'N/kg','range']]},{id:'reactive',name:'Reactive Strength',desc:'Fast force acceptance and rebound. RSI, contact time, hopping and stiffness.',streams:['Pogos','Drop Jump','SL Drop Jump','Hopping / Bounds'],em:{'Knee State':10,'Motor Control':45,Capacity:55,Strength:70,Power:75,Reactive:100,Running:50,COD:35,Bulletproofing:40},m:[['dldj_rsi','DL Drop Jump RSI',1.3,'','gte'],['dldj_gct','DL Drop Jump GCT',0.25,'s','lte'],['sldj_rsi','SL Drop Jump RSI',0.52,'','gte'],['sldj_gct','SL Drop Jump GCT',0.30,'s','lte'],['triple_dist','Triple Crossover Hop Distance',650,'cm','gte'],['triple_lsi','Triple Crossover Hop LSI',92,'%','gte']]},{id:'running',name:'Linear Running',desc:'High-speed mechanics: pelvis, trunk, hip adduction and exposure progression.',streams:['Running Mechanics','Hip Lock','Acceleration','Max Velocity Exposure'],em:{'Knee State':10,'Motor Control':50,Capacity:75,Strength:60,Power:65,Reactive:75,Running:100,COD:35,Bulletproofing:45},m:[['pelvic_tilt','Peak Pelvic Tilt',16,'°','lte'],['pelvic_exc','Peak Pelvic Excursion',11,'°','lte'],['trunk_angle','Peak Trunk Angle',11,'°','lte'],['pelvic_ob_run','Peak Pelvic Obliquity',5,'°','gte'],['hip_add','Peak Hip Adduction',13,'°','lte'],['trunk_lat','Peak Trunk Lateral Flexion',12,'°','lte']]},{id:'cod',name:'Change of Direction',desc:'Deceleration, cutting and sport-direction force redirection.',streams:['Deceleration','45° Cut','90° Cut','Reactive Cut','Sport Chaos'],em:{'Knee State':5,'Motor Control':55,Capacity:75,Strength:75,Power:75,Reactive:80,Running:75,COD:100,Bulletproofing:55},m:[['pen_asym','Penultimate Foot Contact Asymmetry',10,'%','lt'],['pen_time','Penultimate Foot Contact Time',0.46,'s','lt'],['cod_knee','Peak Knee Flexion',[37,59],'°','range'],['cod_hip','Peak Hip Flexion',[22,49],'°','range'],['cod_trunk','Peak Trunk Flexion',5,'°','gt'],['cod_pelvis','Peak Pelvic Obliquity',17,'°','gt']]},{id:'rtp',name:'Return to Performance Gates',desc:'Entry gates for running, COD, full training and return to play.',streams:['Return to Run Gate','COD Gate','Full Training Gate','RTP Gate'],em:{'Knee State':20,'Motor Control':60,Capacity:85,Strength:90,Power:85,Reactive:85,Running:90,COD:85,Bulletproofing:60},m:[['rtr_ext','Run Gate Knee Extension',2.31,'Nm/kg','gte'],['rtr_flex','Run Gate Knee Flexion',1.4,'Nm/kg','gte'],['rtr_pf','Run Gate Seated PF',140,'% BW','gte'],['rtr_slcmj','Run Gate SLCMJ',12,'cm','gte'],['rtr_sldj','Run Gate SLDJ RSI',0.36,'','gte'],['cod_ext','COD Gate Knee Extension',2.64,'Nm/kg','gte'],['full_ext','Full Training Knee Extension',3.0,'Nm/kg','gte'],['acl_rsi','ACL-RSI',60,'','gte'],['rtp_ext','RTP Knee Extension',3.3,'Nm/kg','gte'],['rtp_sldj','RTP SLDJ RSI',0.52,'','gte']]}];const DEFAULT=[{id:'sample',name:'Sample ACLR Athlete',meta:'Right ACLR · Week 18 · Field sport',v:{sl_squat:18,split_squat:22,sl_bridge:20,sl_calf:21,box_landing_lsi:84,knee_ext:2.72,knee_flex:1.62,seated_pf:165,hip_abd:1.72,sl_depth:101,front_squat:.95,deadlift:1.55,split_load:.36,dl_cmj:31.5,dl_impulse:2.35,dl_p2:42,dl_ecc:.43,dl_power:47,dl_land:41,sl_cmj:13.8,sl_impulse:1.1,sl_p2:39,sl_ecc:.28,sl_land:20,dldj_rsi:1.08,dldj_gct:.27,sldj_rsi:.41,sldj_gct:.33,triple_dist:590,triple_lsi:88,pelvic_tilt:17,pelvic_exc:12,trunk_angle:10,pelvic_ob_run:4,hip_add:14,trunk_lat:10,pen_asym:14,pen_time:.49,cod_knee:35,cod_hip:20,cod_trunk:6,cod_pelvis:15,rtr_ext:2.72,rtr_flex:1.62,rtr_pf:165,rtr_slcmj:13.8,rtr_sldj:.41,cod_ext:2.72,full_ext:2.72,acl_rsi:54,rtp_ext:2.72,rtp_sldj:.41}},{id:'late',name:'Late Stage Athlete',meta:'Left ACLR · Week 34 · Soccer',v:{sl_squat:24,split_squat:25,sl_bridge:24,sl_calf:31,box_landing_lsi:92,knee_ext:3.35,knee_flex:2.05,seated_pf:212,hip_abd:2.08,sl_depth:108,front_squat:1.52,deadlift:2.20,split_load:.52,dl_cmj:39.2,dl_impulse:2.72,dl_p2:47,dl_ecc:.54,dl_power:54,dl_land:48,sl_cmj:17.5,sl_impulse:1.40,sl_p2:46,sl_ecc:.36,sl_land:24,dldj_rsi:1.42,dldj_gct:.23,sldj_rsi:.56,sldj_gct:.28,triple_dist:670,triple_lsi:94,pelvic_tilt:14,pelvic_exc:9,trunk_angle:10,pelvic_ob_run:6,hip_add:11,trunk_lat:9,pen_asym:8,pen_time:.44,cod_knee:43,cod_hip:32,cod_trunk:8,cod_pelvis:20,rtr_ext:3.35,rtr_flex:2.05,rtr_pf:212,rtr_slcmj:17.5,rtr_sldj:.56,cod_ext:3.35,full_ext:3.35,acl_rsi:72,rtp_ext:3.35,rtp_sldj:.56}}];let athletes=JSON.parse(localStorage.hpLL||JSON.stringify(DEFAULT)),aid=athletes[0].id,sid='motor';const $=id=>document.getElementById(id),A=()=>athletes.find(x=>x.id===aid),S=()=>STAGES.find(x=>x.id===sid);function save(){localStorage.hpLL=JSON.stringify(athletes)}function stat(m,v){if(v===''||v==null)return['fail','Missing',0];v=+v;let t=m[2],dir=m[4],pass=false,ratio=0;if(dir==='gte'){pass=v>=t;ratio=v/t}if(dir==='gt'){pass=v>t;ratio=v/t}if(dir==='lte'){pass=v<=t;ratio=t/v}if(dir==='lt'){pass=v<t;ratio=t/v}if(dir==='range'){pass=v>=t[0]&&v<=t[1];let mid=(t[0]+t[1])/2;ratio=pass?1:1-Math.min(Math.abs(v-mid)/mid,1)}if(pass)return['pass','Pass',100];if(ratio>=.85)return['watch','Watch',70];return['fail','Needs work',Math.max(0,Math.round(ratio*60))]}function score(st,a=A()){let r=st.m.map(m=>stat(m,a.v[m[0]])[2]);return Math.round(r.reduce((x,y)=>x+y,0)/r.length)}function overall(){let r=STAGES.map(s=>score(s));return Math.round(r.reduce((a,b)=>a+b,0)/r.length)}function tt(m){return m[4]==='range'?`${m[2][0]}–${m[2][1]} ${m[3]}`:`${m[4].includes('gt')?'≥':'<'} ${m[2]} ${m[3]}`}function render(){let a=A(),s=S(),o=overall();$('ath').innerHTML=athletes.map(x=>`<option value="${x.id}" ${x.id===aid?'selected':''}>${x.name}</option>`).join('');$('meta').textContent=a.meta;$('nav').innerHTML=STAGES.map(x=>`<button class="${x.id===sid?'active':''}" onclick="sid='${x.id}';render()"><span>${x.name}</span><b>${score(x)}%</b></button>`).join('');$('title').textContent=s.name;$('desc').textContent=s.desc;$('overall').textContent=o+'%';$('overalltxt').textContent=o>=85?'Ready profile':o>=70?'Developing profile':'Priority deficits';$('map').innerHTML=STAGES.map(x=>`<div class="q ${x.id===sid?'active':''}" onclick="sid='${x.id}';render()"><h3>${x.name}</h3><p>${x.streams.slice(0,3).join(' · ')}</p><b>${score(x)}%</b></div>`).join('');$('bars').innerHTML=Object.entries(s.em).map(([k,v])=>`<div class="bar"><div class="barlabel"><span>${k}</span><span>${v}%</span></div><div class="track"><div class="fill" style="width:${v}%"></div></div></div>`).join('');$('metrics').innerHTML=s.m.map(m=>{let v=a.v[m[0]]??'',st=stat(m,v);return`<div class="metric"><div class="mtop"><h4>${m[1]}</h4><span class="pill ${st[0]}">${st[1]}</span></div><div class="target">Target: <b>${tt(m)}</b></div><input type="number" step="0.01" value="${v}" oninput="A().v['${m[0]}']=this.value===''?'':+this.value;save();render()"></div>`}).join('');$('streams').innerHTML=s.streams.map(x=>`<div class="stream">${x}</div>`).join('');let all=STAGES.flatMap(st=>st.m.map(m=>({m,stage:st.name,v:a.v[m[0]],s:stat(m,a.v[m[0]])}))).filter(x=>x.s[0]!=='pass').sort((x,y)=>x.s[2]-y.s[2]).slice(0,6);$('priorities').innerHTML=all.length?all.map(x=>`<li><b>${x.m[1]}</b> (${x.stage}) — current ${x.v??'missing'} ${x.m[3]}, target ${tt(x.m)}</li>`).join(''):'<li>All listed targets passed. Annoyingly competent.</li>';$('summary').value=`${a.name} | ${a.meta}\nOverall lower-limb readiness: ${o}%\n\nCurrent focus: ${s.name}\nProgramming streams: ${s.streams.join(', ')}\n\nTop priorities:\n${all.slice(0,4).map((x,i)=>`${i+1}. ${x.m[1]}: ${x.v??'missing'} ${x.m[3]} vs ${tt(x.m)}`).join('\n')}`}$('ath').onchange=e=>{aid=e.target.value;render()};$('reset').onclick=()=>{athletes=JSON.parse(JSON.stringify(DEFAULT));aid=athletes[0].id;save();render()};$('copy').onclick=()=>navigator.clipboard.writeText($('summary').value).then(()=>alert('Summary copied.'));$('export').onclick=()=>{let b=new Blob([JSON.stringify(A(),null,2)],{type:'application/json'}),u=URL.createObjectURL(b),l=document.createElement('a');l.href=u;l.download=A().id+'_hp_lower_limb.json';l.click();URL.revokeObjectURL(u)};render();</script></body></html>
