<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HP Lower Limb Desktop Dashboard</title><style>:root{--char:#33434d;--cyan:#08aad0;--bg:#f4f8fb;--card:#fff;--text:#102033;--muted:#6a7b8f;--line:#dce7ef;--green:#13b878;--amber:#f1b33f;--red:#e94b6a}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;color:var(--text)}header{background:var(--char);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:sticky;top:0;z-index:5}.brand{display:flex;align-items:center;gap:18px}.logo{background:#fff;border-radius:14px;padding:8px;width:230px}.logo svg{display:block;width:100%}.brand h1{margin:0;font-size:22px}.brand p{margin:3px 0 0;color:#cfe8ee;font-size:13px}.topcontrols{display:grid;grid-template-columns:210px 140px 155px 110px;gap:10px;align-items:end}label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#d6edf2}select,input,textarea,button{font-family:inherit}select,input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff;font-weight:700}.wrap{padding:20px;max-width:1900px;margin:0 auto}.summary{display:grid;grid-template-columns:250px 1fr 360px;gap:16px;margin-bottom:16px}.panel{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 12px 30px rgba(51,67,77,.08);border:1px solid #edf3f7}.score{background:linear-gradient(180deg,var(--char),#26343d);color:#fff;border-radius:18px;padding:18px;text-align:center}.score span{color:#cfe8ee;font-size:13px}.score b{display:block;font-size:52px;line-height:1}.score p{margin:5px 0 0}.domainGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.domain{border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer;background:#fff}.domain.active{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(8,170,208,.12)}. :var(--cyan)}@media(max-width:1200px){.summary{grid-template-columns:1fr}.domainGrid{grid-template-columns:repeat(2,1fr)}.topcontrols{grid-template-columns:1fr 1fr}.reportGrid{grid-template-columns:1fr}}@media(max-width:760px){header{display:block}.logo{width:210px}.topcontrols{margin-top:12px;grid-template-columns:1fr}.wrap{padding:12px}table{font-size:12px}}</style></head><body><header><div class="brand"><div class="logo"><svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg"><circle cx="170" cy="180" r="130" fill="#33434d"/><text x="95" y="230" font-family="Arial" font-size="145" font-style="italic" font-weight="700" fill="#fff">H</text><text x="190" y="230" font-family="Arial" font-size="145" font-style="italic" font-weight="800" fill="#08aad0">P</text><circle cx="238" cy="238" r="22" fill="#08aad0"/><text x="360" y="178" font-family="Arial" font-size="135" font-weight="300" fill="#33434d">Healthia</text><text x="365" y="270" font-family="Arial" font-size="80" font-style="italic" font-weight="900" letter-spacing="4" fill="#08aad0">PERFORMANCE</text></svg></div><div><h1>Lower Limb Performance Dashboard</h1><p>Desktop clinical tool · full metric library · bilateral data entry</p></div></div><div class="topcontrols"><div><label>Athlete</label><select id="ath"></select></div><div><label>Target side</label><select id="side"><option value="left">Left</option><option value="right">Right</option></select></div><div><label>Session</label><select id="session"></select></div><div><button class="btn cyan" id="addSession">+ Session</button></div></div></header><main class="wrap"><section class="summary"><div class="score"><span>Overall Readiness</span><b id="overall">--%</b><p id="overallText"></p></div><div class="panel"><div class="domainGrid" id="domainGrid"></div></div><div class="panel priority"><h3 style="margin:0 0 8px">Top Priorities</h3><ol id="priorities"></ol></div></section><div class="toolbar"><button class="btn cyan" id="addAthlete">+ Add Athlete</button><button class="btn" id="duplicateSession">Duplicate Session</button><button class="btn" id="resetDemo">Reset Demo</button><button class="btn" id="copyReport">Copy Report</button><button class="btn" id="exportJson">Export JSON</button></div><section class="tables" id="tables"></section><section class="reportGrid"><div class="panel"><h2 style="margin-top:0">Trend Snapshot</h2><select id="trendMetric"></select><div id="chart" class="chart"></div></div><div class="panel"><h2 style="margin-top:0">Clinician Summary</h2><textarea id="report"></textarea></div></section></main><script>const U=1,B=0;const DOMAINS={motor:{name:'Motor Control & Capacity',desc:'Movement ownership, capacity and early landing tolerance.',streams:['Single-Leg Control','Capacity','Landing Prep','Bulletproofing'],items:[['sl_squat','Single-Leg Squat to 90°',20,'reps @ 40 bpm','gte',U],['split_squat','Split Squat',20,'reps @ 40 bpm','gte',U],['sl_bridge','Single-Leg Hamstring Bridge',20,'reps @ 40 bpm','gte',U],['sl_calf','Single-Leg Calf Raise',25,'reps @ 60 bpm','gte',U],['box_landing_lsi','Box Landing Peak Landing Force LSI',80,'%','gte',B]]},strength:{name:'Strength & Hypertrophy',desc:'Local torque, hypertrophy and global force capacity.',streams:['Quad','Hamstring','Calf/Soleus','Hip Strength','Bilateral Lift','Single-Leg Strength'],items:[['knee_ext','Knee Extension Strength',3.3,'Nm/kg','gte',U],['knee_flex','Knee Flexion Strength',2.0,'Nm/kg','gte',U],['seated_pf','Seated Plantarflexion Strength',200,'% BW','gte',U],['hip_abd','Hip Abduction Strength',2.0,'Nm/kg','gte',U],['sl_depth','5RM Single-Leg Squat Depth Average',105,'° knee flexion','gte',U],['front_squat','Front Squat 1RM',1.5,'× BW','gte',B],['deadlift','Deadlift 1RM',2.25,'× BW','gte',B],['split_load','Split Squat 5RM',0.5,'× BW','gte',U]]},power:{name:'Power & RFD',desc:'CMJ kinetics and landing kinematics.',streams:['Jump Power','Quad Speed','Hip Extension Power','Landing Kinematics'],items:[['dl_cmj','DL CMJ Height',38,'cm','g tems:[['pen_asym','Penultimate Foot Contact Asymmetry',10,'%','lt',B],['pen_time','Penultimate Foot Contact Time',0.46,'s','lt',U],['cod_knee','Peak Knee Flexion',[37,59],'°','range',U],['cod_hip','Peak Hip Flexion',[22,49],'°','range',U],['cod_trunk','Peak Trunk Flexion',5,'°','gt',U],['cod_pelvis','Peak Pelvic Obliquity',17,'°','gt',U]]},gates:{name:'Entry / Return Gates',desc:'Linear running, COD, full training and RTP gates.',streams:['Return to Run','COD Gate','Full Training','Return to Play'],items:[['rtr_ext','Run Gate Knee Extension',2.31,'Nm/kg','gte',U],['rtr_flex','Run Gate Knee Flexion',1.4,'Nm/kg','gte',U],['rtr_pf','Run Gate Seated PF',140,'% BW','gte',U],['rtr_slcmj','Run Gate SLCMJ Height',12,'cm','gte',U],['rtr_sldj','Run Gate SLDJ RSI',0.36,'','gte',U],['cod_ext','COD Gate Knee Extension',2.64,'Nm/kg','gte',U],['cod_flex','COD Gate Knee Flexion',1.6,'Nm/kg','gte',U],['cod_pf','COD Gate Seated PF',160,'% BW','gte',U],['cod_abd','COD Gate Hip Abduction',1.6,'Nm/kg','gte',U],['cod_slcmj','COD Gate SLCMJ Height',13.7,'cm','gte',U],['cod_sldj','COD Gate SLDJ RSI',0.42,'','gte',U],['full_ext','Full Training Knee Extension',3.0,'Nm/kg','gte',U],['full_flex','Full Training Knee Flexion',1.8,'Nm/kg','gte',U],['full_pf','Full Training Seated PF',180,'% BW','gte',U],['full_abd','Full Training Hip Abduction',1.8,'Nm/kg','gte',U],['full_slcmj','Full Training SLCMJ Height',15.4,'cm','gte',U],['full_sldj','Full Training SLDJ RSI',0.47,'','gte',U],['acl_rsi','ACL-RSI',60,'','gte',B],['rtp_ext','RTP Knee Extension',3.3,'Nm/kg','gte',U],['rtp_flex','RTP Knee Flexion',2.0,'Nm/kg','gte',U],['rtp_pf','RTP Seated PF',200,'% BW','gte',U],['rtp_abd','RTP Hip Abduction',2.0,'Nm/kg','gte',U],['rtp_slcmj','RTP SLCMJ Height',17.1,'cm','gte',U],['rtp_sldj','RTP SLDJ RSI',0.52,'','gte',U]]}};const KEYS=Object.keys(DOMAINS);const ALL=()=>KEYS.flatMap(k=>DOMAINS[k].items.map(m=>({m,k})));function blank(date){let s={date};ALL().forEach(o=>s[o.m[0]]=o.m[5]?{left:'',right:''}:'' );return s}function demo(){let s=blank('2026-05-01'),v={sl_squat:{left:24,right:18},split_squat:{left:23,right:22},sl_bridge:{left:22,right:20},sl_calf:{left:28,right:21},box_landing_lsi:84,knee_ext:{left:3.4,right:2.72},knee_flex:{left:2.05,right:1.62},seated_pf:{left:210,right:165},hip_abd:{left:2.05,right:1.72},sl_depth:{left:110,right:101},front_squat:.95,deadlift:1.55,split_load:{left:.48,right:.36},dl_cmj:31.5,dl_impulse:2.35,dl_p2:42,dl_ecc:.43,dl_power:47,dl_land:41,sl_cmj:{left:18.2,right:13.8},sl_impulse:{left:1.45,right:1.10},sl_p2:{left:47,right:39},sl_ecc:{left:.38,right:.28},sl_land:{left:25,right:20},cmj_knee_depth:62,cmj_hip_depth:48,land_knee_initial:12,land_knee_peak:42,land_hip:28,dldj_rsi:1.08,dldj_gct:.27,sldj_rsi:{left:.58,right:.41},sldj_gct:{left:.27,right:.33},triple_dist:{left:680,right:590},triple_lsi:88,pelvic_tilt:{left:14,right:17},pelvic_exc:{left:9,right:12},trunk_angle:{left:10,right:10},pelvic_ob_run:{left:6,right:4},hip_add:{left:11,right:14},trunk_lat:{left:9,right:10},pen_asym:14,pen_time:{left:.44,right:.49},cod_knee:{left:43,right:35},cod_hip:{left:32,right:20},cod_trunk:{left:8,right:6},cod_pelvis:{left:20,right:15},rtr_ext:{left:3.4,right:2.72},rtr_flex:{left:2.05,right:1.62},rtr_pf:{left:210,right:165},rtr_slcmj:{left:18.2,right:13.8},rtr_sldj:{left:.58,right:.41},cod_ext:{left:3.4,right:2.72},cod_flex:{left:2.05,right:1.62},cod_pf:{left:210,right:165},cod_abd:{left:2.05,right:1.72},cod_slcmj:{left:18.2,right:13.8},cod_sldj:{left:.58,right:.41},full_ext:{left:3.4,right:2.72},full_flex:{left:2.05,right:1.62},full_pf:{left:210,right:165},full_abd:{left:2.05,right:1.72},full_slcmj:{left:18.2,right:13.8},full_sldj:{left:.58,right:.41},acl_rsi:54,rtp_ext:{left:3.4,right:2.72},rtp_flex:{left:2.05,right:1.62},rtp_pf:{left:210,right:165},rtp_abd:{left:2.05,right:1.72},rtp_slcmj:{left:18.2,right:13.8},rtp_sldj:{left:.58,right:.41}};return Object.assign(s,v)}let db=JSON.parse(localStorage.HPDesktop||JSON.stringify({athletes:[{name:'Sample ACLR Athlete',side:'right',sessions:[demo()]}]})),ai=0,si=0,active='all';const $=id=>document.getElementById(id),A=()=>db.athletes[ai],S=()=>A().sessions[si];function save(){localStorage.HPDesktop=JSON.stringify(db)}function get(m,s=S(),a=A()){let x=s[m[0]];return m[5]?Number((x||{})[a.side]):Number(x)}function lsi(m,s=S()){let x=s[m[0]];if(!m[5]||!x||x.left===''||x.right==='')return null;let L=Number(x.left),R=Number(x.right);if(!L||!R)return null;return Math.round(Math.min(L,R)/Math.max(L,R)*100)}function status(m){let v=get(m);if(Number.isNaN(v))return ['fail','Missing',0];let t=m[2],d=m[4],p=false,r=0;if(d==='gte'){p=v>=t;r=v/t}if(d==='gt'){p=v>t;r=v/t}if(d==='lte'){p=v<=t;r=t/v}if(d==='lt'){p=v<t;r=t/v}if(d==='range'){p=v>=t[0]&&v<=t[1];let mid=(t[0]+t[1])/2;r=p?1:1-Math.min(Math.abs(v-mid)/mid,1)}let L=lsi(m),sym=!m[5]||L===null||L>=92;if(p&&sym)return ['pass','Pass',100];if(p&&!sym)return ['watch','LSI watch',70];if(r>=.85)return ['watch','Watch',70];return ['fail','Needs work',Math.max(0,Math.round(r*60))]}function score(k){let arr=DOMAINS[k].items.map(m=>status(m)[2]);return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)}function overall(){let arr=KEYS.map(score);return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)}function target(m){return m[4]==='range'?`${m[2][0]}–${m[2][1]} ${m[3]}`:`${m[4].includes('gt')?'≥':'<'} ${m[2]} ${m[3]}`}function setv(k,side,v){let s=S();if(side){s[k]=s[k]&&typeof s[k]==='object'?s[k]:{left:'',right:''};s[k][side]=v===''?'':Number(v)}else s[k]=v===''?'':Number(v);save();render()}function deficits(){return ALL().map(o=>({m:o.m,k:o.k,v:get(o.m),L:lsi(o.m),st:status(o.m)})).filter(x=>x.st[0]!=='pass').sort((a,b)=>a.st[2]-b.st[2])}function render(){ath.innerHTML=db.athletes.map((x,i)=>`<option value=${i}>${x.name}</option>`).join('');ath.value=ai;side.value=A().side;session.innerHTML=A().sessions.map((x,i)=>`<option value=${i}>${x.date}</option>`).join('');session.value=si;let o=overall();overall.innerText=o+'%';overallText.innerText=o>=85?'Ready profile':o>=70?'Developing profile':'Priority deficits';domainGrid.innerHTML=KEYS.map(k=>`<div class='domain ${active===k?'active':''}' onclick="active='${active===k?'all':k}';render()"><h3>${DOMAINS[k].name}</h3><b>${score(k)}%</b></div>`).join('');let d=deficits();priorities.innerHTML=d.slice(0,6).map(x=>`<li><b>${x.m[1]}</b> — ${x.m[5]?A().side+' ':''}${Number.isNaN(x.v)?'missing':x.v} ${x.m[3]}${x.L?`, LSI ${x.L}%`:''}; target ${target(x.m)}</li>`).join('')||'<li>All targets passed.</li>';let show=active==='all'?KEYS:[active];tables.innerHTML=show.map(k=>domainTable(k)).join('');trendMetric.innerHTML=ALL().map(o=>`<option value='${o.m[0]}'>${o.m[1]}</option>`).join('');drawChart();report.value=`${A().name}\nTarget side: ${A().side}\nSession: ${S().date}\nOverall readiness: ${o}%\n\nTop priorities:\n${d.slice(0,8).map((x,i)=>`${i+1}. ${x.m[1]}: ${x.m[5]?A().side+' ':''}${Number.isNaN(x.v)?'missing':x.v} ${x.m[3]}${x.L?`, LSI ${x.L}%`:''} vs ${target(x.m)}`).join('\n')}`}function domainTable(k){let D=DOMAINS[k];return `<div class=domainTable><div class=domainTitle><div><h2>${D.name}</h2><p>${D.desc}</p></div><div class=streamTags>${D.streams.map(s=>`<span class=tag>${s}</span>`).join('')}</div></div><table><thead><tr><th>Metric</th><th>Target</th><th>Left</th><th>Right</th><th>Target Side</th><th>LSI</th><th>Status</th></tr></thead><tbody>${D.items.map(m=>row(m)).join('')}</tbody></table></div>`}function row(m){let x=S()[m[0]],st=status(m),L=lsi(m);let left=m[5]?`<input type=number step=.01 value='${x?.left??''}' oninput="setv('${m[0]}','left',this.value)">`:'<span class=muted>—</span>';let right=m[5]?`<input type=number step=.01 value='${x?.right??''}' oninput="setv('${m[0]}','right',this.value)">`:'<span class=muted>—</span>';let bilateral=!m[5]?`<input type=number step=.01 value='${x??''}' oninput="setv('${m[0]}',null,this.value)">`:get(m)||'--';return `<tr><td class=metricName>${m[1]}</td><td class=target>${target(m)}</td><td>${left}</td><td>${right}</td><td>${bilateral} <span class=muted>${m[3]}</span></td><td>${L??'--'}${L?'%':''}</td><td><span class='status ${st[0]}'>${st[1]}</span></td></tr>`}function drawChart(){let key=trendMetric.value||'knee_ext',obj=ALL().find(o=>o.m[0]===key);if(!obj){chart.innerHTML='';return}let vals=A().sessions.map(ss=>({date:ss.date,v:get(obj.m,ss,A())})).filter(x=>!Number.isNaN(x.v));let max=Math.max(...vals.map(x=>x.v),1);chart.innerHTML=vals.map(x=>`<div class=barrow><span>${x.date}</span><div class=bartrack><div class=barfill style='width:${Math.min(100,x.v/max*100)}%'></div></div><b>${x.v}</b></div>`).join('')||'<p class=muted>No trend data yet.</p>'} }ath.onchange=e=>{ai=+e.target.value;si=0;render()};side.onchange=e=>{A().side=e.target.value;save();render()};session.onchange=e=>{si=+e.target.value;render()};trendMetric.onchange=()=>render();addAthlete.onclick=()=>{let name=prompt('Athlete name?')||'New Athlete';db.athletes.push({name,side:'right',sessions:[blank(new Date().toISOString().slice(0,10))]});ai=db.athletes.length-1;si=0;save();render()};addSession.onclick=()=>{let d=prompt('Session date? YYYY-MM-DD')||new Date().toISOString().slice(0,10);A().sessions.push(blank(d));si=A().sessions.length-1;save();render()};duplicateSession.onclick=()=>{let n=JSON.parse(JSON.stringify(S()));n.date=prompt('New session date? YYYY-MM-DD')||new Date().toISOString().slice(0,10);A().sessions.push(n);si=A().sessions.length-1;save();render()};resetDemo.onclick=()=>{localStorage.removeItem('HPDesktop');location.reload()};copyReport.onclick=()=>navigator.clipboard.writeText(report.value);exportJson.onclick=()=>{let b=new Blob([JSON.stringify(A(),null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=A().name.replaceAll(' ','_')+'.json';a.click()};render();</script></body></html>
